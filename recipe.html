<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Recipe Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="recipe.css">
</head>
<body>
    <header class="header">
        <h1 class="site-title">My Recipe Map</h1>
        <p class="site-subtitle">Recipes I've made from around the world</p>
    </header>

    <main class="main">
        <div class="map-wrapper">
            <svg id="world-map" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg" aria-label="World map — click a continent to see recipes">

                <!-- Ocean -->
                <rect width="1000" height="500" fill="var(--ocean)"/>

                <!-- Decorative grid lines -->
                <g class="graticule" stroke="rgba(255,255,255,0.28)" stroke-width="0.6" fill="none">
                    <line x1="0" y1="250" x2="1000" y2="250"/>
                    <line x1="0" y1="195" x2="1000" y2="195" stroke-dasharray="4,5"/>
                    <line x1="0" y1="305" x2="1000" y2="305" stroke-dasharray="4,5"/>
                    <line x1="0" y1="118" x2="1000" y2="118" stroke-dasharray="2,7"/>
                    <line x1="333" y1="0" x2="333" y2="500" stroke-dasharray="4,5"/>
                    <line x1="667" y1="0" x2="667" y2="500" stroke-dasharray="4,5"/>
                    <line x1="500" y1="0" x2="500" y2="500" stroke-dasharray="1,8"/>
                </g>

                <!-- Antarctica strip -->
                <path d="M0,470 L1000,470 L1000,500 L0,500 Z" fill="var(--land)" opacity="0.55" pointer-events="none"/>

                <!-- ── North America ── -->
                <g class="continent" id="north-america" data-continent="North America" tabindex="0" role="button" aria-label="North America">
                    <path d="M60,80 L120,42 L175,32 L235,48 L285,72 L305,78 L295,125 L285,162 L275,200 L260,220 L245,248 L228,258 L205,248 L190,232 L178,215 L162,210 L150,190 L142,175 L130,162 L115,152 L98,148 L80,138 L62,112 Z"/>
                    <text x="183" y="155" class="continent-label">North America</text>
                </g>

                <!-- ── South America ── -->
                <g class="continent" id="south-america" data-continent="South America" tabindex="0" role="button" aria-label="South America">
                    <path d="M215,258 L248,252 L272,265 L288,295 L292,332 L288,370 L270,408 L248,428 L225,430 L205,418 L192,395 L186,362 L188,328 L195,298 L205,272 Z"/>
                    <text x="238" y="338" class="continent-label">South</text>
                    <text x="238" y="354" class="continent-label">America</text>
                </g>

                <!-- ── Europe ── -->
                <g class="continent" id="europe" data-continent="Europe" tabindex="0" role="button" aria-label="Europe">
                    <path d="M392,52 L422,44 L456,40 L492,44 L516,54 L525,70 L520,88 L512,102 L498,115 L475,122 L450,120 L428,112 L410,100 L398,84 L390,68 Z"/>
                    <text x="457" y="86" class="continent-label">Europe</text>
                </g>

                <!-- ── Africa ── -->
                <g class="continent" id="africa" data-continent="Africa" tabindex="0" role="button" aria-label="Africa">
                    <path d="M400,124 L435,115 L465,114 L498,118 L522,132 L534,158 L538,192 L535,235 L528,272 L518,310 L500,342 L478,362 L452,370 L425,364 L405,344 L390,314 L382,275 L380,235 L382,195 L388,162 L396,140 Z"/>
                    <text x="457" y="248" class="continent-label">Africa</text>
                </g>

                <!-- ── Asia ── -->
                <g class="continent" id="asia" data-continent="Asia" tabindex="0" role="button" aria-label="Asia">
                    <path d="M522,38 L572,30 L642,24 L722,26 L792,34 L852,50 L898,68 L932,90 L950,118 L952,152 L938,188 L914,212 L885,232 L848,245 L805,250 L760,244 L718,234 L672,222 L635,212 L598,200 L564,184 L542,164 L532,142 L524,118 L520,90 L520,60 Z"/>
                    <text x="730" y="148" class="continent-label">Asia</text>
                </g>

                <!-- ── Oceania ── -->
                <g class="continent" id="oceania" data-continent="Oceania" tabindex="0" role="button" aria-label="Oceania">
                    <path d="M782,300 L826,286 L872,287 L910,300 L928,324 L925,358 L908,375 L875,386 L840,384 L810,370 L792,348 L782,322 Z"/>
                    <text x="854" y="338" class="continent-label">Oceania</text>
                </g>

                <!-- Recipe count badges (filled by JS) -->
                <g id="recipe-badges"></g>

            </svg>
            <p class="map-hint">Click a continent to explore your recipes</p>
        </div>
    </main>

    <!-- Recipe Sidebar -->
    <aside class="sidebar" id="recipe-sidebar" aria-hidden="true">
        <div class="sidebar-header">
            <h2 class="sidebar-title" id="sidebar-title">—</h2>
            <button class="sidebar-close" id="close-sidebar" aria-label="Close sidebar">✕</button>
        </div>
        <ul class="recipe-list" id="sidebar-recipe-list"></ul>
        <p class="empty-state" id="no-recipes-msg" style="display:none">
            No recipes yet from this continent.<br>
            Hit <strong>+</strong> to add one!
        </p>
    </aside>

    <div class="overlay" id="overlay"></div>

    <!-- Floating Add Button -->
    <button class="fab" id="open-add-modal" aria-label="Add a new recipe">+</button>

    <!-- Add Recipe Modal -->
    <div class="modal" id="add-modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="modal-heading">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="modal-heading">Add a Recipe</h2>
                <button class="modal-close" id="close-modal" aria-label="Close">✕</button>
            </div>
            <div class="form-group">
                <label for="new-recipe">Recipe name</label>
                <input type="text" id="new-recipe" placeholder="e.g. Butter Chicken" autocomplete="off">
            </div>
            <div class="form-group">
                <label for="recipe-continent">Continent</label>
                <select id="recipe-continent">
                    <option value="">Choose a continent…</option>
                    <option value="North America">North America</option>
                    <option value="South America">South America</option>
                    <option value="Europe">Europe</option>
                    <option value="Africa">Africa</option>
                    <option value="Asia">Asia</option>
                    <option value="Oceania">Oceania</option>
                </select>
            </div>
            <button class="btn-primary" id="add-recipe">Add Recipe</button>
        </div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="recipe.js"></script>
</body>
</html>
